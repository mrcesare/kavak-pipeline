<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Kavak Pipeline</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f3;color:#1a1a18;font-size:13px}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.topbar h1{font-size:15px;font-weight:700}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px}
.sync-dot.ok{background:#1D9E75}.sync-dot.err{background:#E24B4A}.sync-dot.loading{background:#FFB300}
.main{padding:16px 20px;max-width:1400px;margin:0 auto}
.upload-area{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.upload-box{border:2px dashed #ccc;border-radius:10px;padding:18px;text-align:center;cursor:pointer;background:#fff}
.upload-box:hover{background:#fafaf8}
.upload-box input{display:none}
.upload-box b{font-size:13px}
.upload-box p{font-size:11px;color:#888;margin-top:3px}
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:6px;font-weight:600}
.tag-morning{background:#EAF3DE;color:#3B6D11}
.tag-afternoon{background:#E6F1FB;color:#0C447C}
.umsg{font-size:11px;margin-top:5px;color:#888}
.umsg.ok{color:#3B6D11}.umsg.err{color:#A32D2D}
.cloud-bar{background:#fff;border:1px solid #eee;border-radius:8px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:12px}
.cloud-bar.has-data{border-color:#1D9E75;background:#f0faf5}
.btn-sm{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px}
.btn-sm:hover{background:#f0f0ee}
.btn-sm.primary{background:#1a1a18;color:#fff;border-color:#1a1a18}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters select,.filters input{flex:1;min-width:120px;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:14px}
.metric{background:#fff;border-radius:8px;padding:11px 13px;border:1px solid #eee}
.mlabel{font-size:11px;color:#888;margin-bottom:2px}
.mval{font-size:21px;font-weight:600}
.mval.hi{color:#FFB300}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.chart-box{background:#fff;border-radius:8px;padding:13px;border:1px solid #eee}
.ctitle{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:9px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.blabel{width:130px;text-align:right;font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bbg{flex:1;height:12px;background:#f0f0ee;border-radius:3px;overflow:hidden}
.bfill{height:100%;border-radius:3px}
.bcount{width:24px;text-align:right;font-size:11px;color:#888}
.table-wrap{background:#fff;border-radius:8px;border:1px solid #eee;overflow:auto;max-height:460px}
table{width:100%;border-collapse:collapse}
th{position:sticky;top:0;background:#f8f8f6;padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #eee;white-space:nowrap;font-size:12px}
td{padding:7px 10px;border-bottom:1px solid #f0f0ee;font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
tr.is-new td{background:#FFFBEB}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;cursor:pointer;white-space:nowrap}
.ag0{color:#3B6D11;font-weight:600}.ag1{color:#BA7517;font-weight:600}.ag2{color:#A32D2D;font-weight:600}
.new-badge{display:inline-block;font-size:10px;background:#FFB300;color:#fff;padding:1px 7px;border-radius:20px;font-weight:700}
.note-preview{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.note-date{font-size:10px;color:#aaa}
.note-btn{font-size:11px;color:#888;cursor:pointer;padding:2px 7px;border:1px solid #ddd;border-radius:5px;background:#fff}
.note-btn:hover{background:#f0f0ee}
.note-btn.has-note{color:#1D9E75;border-color:#1D9E75}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:20px;width:340px;max-height:85vh;overflow-y:auto}
.modal-box.wide{width:380px}
.modal-box h3{font-size:14px;font-weight:600;margin-bottom:12px;padding-right:24px}
.modal-x{position:absolute;top:16px;right:16px;cursor:pointer;color:#aaa;font-size:22px;line-height:1}
.modal-inner{position:relative}
.sopt{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer}
.sopt:hover{background:#f5f5f3}
.sdot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.note-meta{font-size:11px;color:#888;margin-bottom:8px}
.note-ta{width:100%;min-height:110px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical}
.note-ta:focus{outline:none;border-color:#1D9E75}
.note-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.btn-save{padding:7px 16px;background:#1a1a18;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:13px}
.btn-del{padding:7px 12px;background:#fff;color:#888;border:1px solid #ddd;border-radius:7px;cursor:pointer;font-size:13px}
.hist-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin:12px 0 6px;border-top:1px solid #f0f0ee;padding-top:12px}
.hist-entry{background:#f8f8f6;border-radius:7px;padding:9px 11px;margin-bottom:6px;font-size:12px}
.hist-date{font-size:10px;color:#aaa;margin-top:3px}
.hidden{display:none}
@media(max-width:640px){.charts{grid-template-columns:1fr}.upload-area{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <h1>Kavak Pipeline MX</h1>
  <span id="dealCount" style="font-size:12px;color:#888"></span>
  <span style="font-size:12px;color:#888"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Conectando...</span></span>
  <span id="lastUpdate" style="margin-left:auto;font-size:11px;color:#888"></span>
</div>

<div class="main">

  <!-- Barra de estado del CSV en nube -->
  <div class="cloud-bar" id="cloudBar">
    <span id="cloudMsg" style="flex:1">Cargando datos compartidos...</span>
    <button class="btn-sm" onclick="document.getElementById('csvM').click()">Subir nuevo CSV mañana</button>
    <button class="btn-sm" onclick="document.getElementById('csvT').click()">+ Corte tarde</button>
    <input type="file" id="csvM" accept=".csv" style="display:none" onchange="handleFile(event,'morning')"/>
    <input type="file" id="csvT" accept=".csv" style="display:none" onchange="handleFile(event,'afternoon')"/>
  </div>

  <div id="dashboard" class="hidden">
    <div class="filters">
      <select id="fA" onchange="render()"><option value="">Todos los asesores</option></select>
      <select id="fE" onchange="render()"><option value="">Todos los estatus</option></select>
      <select id="fM" onchange="render()"><option value="">Todos los métodos de pago</option></select>
      <select id="fC" onchange="render()">
        <option value="">Todos los cortes</option>
        <option value="morning">Solo mañana</option>
        <option value="afternoon">Solo nuevos (tarde)</option>
      </select>
      <input id="fQ" type="text" placeholder="Buscar..." oninput="render()"/>
    </div>
    <div class="metrics" id="metrics"></div>
    <div class="charts">
      <div class="chart-box"><div class="ctitle">Por estatus</div><div id="bEM"></div></div>
      <div class="chart-box"><div class="ctitle">Por asesor</div><div id="bOwner"></div></div>
    </div>
    <p style="font-size:11px;color:#aaa;margin-bottom:6px">Clic en estatus para cambiarlo · Clic en "Nota" para comentarios · <span style="background:#FFFBEB;padding:1px 5px;border-radius:3px;color:#BA7517">amarillo</span> = nueva del corte tarde</p>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Asesor</th><th>Estatus</th><th>Aging</th><th>Método pago</th><th>F. Reserva</th><th>Corte</th><th>Nota</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal estatus -->
<div class="modal-overlay" id="ovStatus" onclick="if(event.target===this)closeStatus()">
  <div class="modal-box modal-inner">
    <span class="modal-x" onclick="closeStatus()">×</span>
    <h3>Cambiar estatus</h3>
    <div id="sOpts"></div>
  </div>
</div>

<!-- Modal nota -->
<div class="modal-overlay" id="ovNote" onclick="if(event.target===this)closeNote()">
  <div class="modal-box wide modal-inner">
    <span class="modal-x" onclick="closeNote()">×</span>
    <h3 id="nTitle">Nota</h3>
    <div class="note-meta" id="nMeta"></div>
    <textarea class="note-ta" id="nText" placeholder="Escribe tu nota aquí..."></textarea>
    <div class="note-actions">
      <button class="btn-del" onclick="deleteNote()">Borrar nota</button>
      <button class="btn-save" onclick="saveNote()">Guardar</button>
    </div>
    <div id="nHist"></div>
  </div>
</div>

<script>
const JSONBIN_KEY='$2a$10$G61NPmdxukqn6BnP5gpVeesDMe.N2RGiRtmBdN0fFuSWEWh/wJ7n.';
const BIN_ID_KEY='kavak_bin_id_v3';
let BIN_ID=null;

const AGENTES=['Angel Cedillo','Miguel Almeyda','Armando Flores','Mauricio Saúl Orozco','Ada Navarro Crasto','Bryan Cortes','Kelly Hernandez','Gabriel Hoyos','Dana Fernadez','Maximiliano Morales','Victor Ledesma','Ivan Espinosa'];
const ESTATUS=[
  {name:'PAGA HOY',c:'#4CAF50'},{name:'PAGA MAÑANA',c:'#81C784'},
  {name:'PAGO PARCIAL',c:'#64B5F6'},{name:'PAGADO',c:'#1565C0'},
  {name:'SEGUIMIENTO',c:'#FFB300'},{name:'PROMESA FUTURA',c:'#90CAF9'},
  {name:'CITA',c:'#1976D2'},{name:'NO CONTESTA',c:'#FF7043'},
  {name:'SIN CONTACTO',c:'#90A4AE'},{name:'MUTACIÓN',c:'#AB47BC'},
  {name:'ALIADO',c:'#EC407A'},{name:'KAVAKO',c:'#26A69A'},
  {name:'MAL ALINEADA HUB',c:'#EF5350'},{name:'CANCELADA',c:'#B71C1C'},
  {name:'CANCELAR',c:'#FF5722'},{name:'DEVOLUCIÓN',c:'#FF8A65'},
];
const EC={};ESTATUS.forEach(e=>EC[e.name]=e.c);
const COLORS=['#378ADD','#1D9E75','#BA7517','#7F77DD','#D85A30','#888780','#639922','#D4537E'];
const C={owner:'Reservacion : Opportunity : Opportunity Owner',em:'EM',aging:'Aging',metodo:'Reservacion : Opportunity : Método de pago del Auto',fres:'F. Reserva',stock:'StockId'};

let allData=[],notes={},overrides={},editIdx=null;

// ── Sync ──────────────────────────────────────────────────
function setSync(s,l){document.getElementById('syncDot').className='sync-dot '+s;document.getElementById('syncLabel').textContent=l;}

async function initBin(){
  setSync('loading','Conectando...');
  const saved=localStorage.getItem(BIN_ID_KEY);
  if(saved){BIN_ID=saved;await pull();return;}
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Name':'kavak-pipe-v3'},body:JSON.stringify({notes:{},overrides:{},csvData:[],lastUpdate:''})});
    const d=await r.json();
    BIN_ID=d.metadata.id;
    localStorage.setItem(BIN_ID_KEY,BIN_ID);
    setSync('ok','Sincronizado');
    updateCloudBar();
  }catch(e){setSync('err','Sin conexión');}
}

async function pull(){
  if(!BIN_ID)return;
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}});
    const d=await r.json();
    const rec=d.record||{};
    notes=rec.notes||{};
    overrides=rec.overrides||{};
    Object.keys(notes).forEach(k=>{if(!notes[k]?.current)delete notes[k];});
    // Cargar CSV compartido si existe
    if(rec.csvData&&rec.csvData.length>0){
      allData=decompressData(rec.csvData);
      populateFilters();render();
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('dealCount').textContent=allData.length+' deals';
      document.getElementById('lastUpdate').textContent='Act: '+(rec.lastUpdate||'');
    }
    setSync('ok','Sincronizado');
    updateCloudBar(rec.lastUpdate);
  }catch(e){setSync('err','Sin conexión');}
}

async function push(){
  if(!BIN_ID)return;
  setSync('loading','Guardando...');
  const now=new Date().toLocaleString('es-MX',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'});
  try{
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({notes,overrides,csvData:compressData(allData),lastUpdate:now})});
    setSync('ok','Guardado ✓');
    document.getElementById('lastUpdate').textContent='Act: '+now;
    updateCloudBar(now);
  }catch(e){setSync('err','Error al guardar');}
}

async function pushMeta(){
  if(!BIN_ID)return;
  setSync('loading','Guardando...');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{headers:{'X-Master-Key':JSONBIN_KEY}});
    const d=await r.json();
    const rec=d.record||{};
    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY},body:JSON.stringify({...rec,notes,overrides})});
    setSync('ok','Guardado ✓');
  }catch(e){setSync('err','Error al guardar');}
}

function updateCloudBar(lastUpdate){
  const bar=document.getElementById('cloudBar');
  const msg=document.getElementById('cloudMsg');
  if(allData.length>0){
    bar.classList.add('has-data');
    msg.textContent=`✓ ${allData.length} deals cargados${lastUpdate?' · Subido: '+lastUpdate:''}`;
  } else {
    bar.classList.remove('has-data');
    msg.textContent='Sin datos — sube el CSV del pipe para que todos lo vean';
  }
}

setInterval(pull,30000);

// ── CSV ───────────────────────────────────────────────────
function parseCSV(txt){
  const lines=txt.trim().split('\n');
  const hdrs=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map((line,i)=>{
    const cols=[];let cur='',inQ=false;
    for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}
    cols.push(cur.trim());
    const obj={_i:String(i)};
    hdrs.forEach((h,j)=>obj[h]=(cols[j]||'').replace(/^"|"$/g,'').trim());
    return obj;
  });
}

function compressData(data){
  return data.map(r=>({
    _i:r._i,
    _corte:r._corte,
    o:r[C.owner]||'',
    a:r[C.aging]||'',
    m:r[C.metodo]||'',
    f:r[C.fres]||'',
    s:r[C.stock]||''
  }));
}
function decompressData(data){
  return data.map(r=>({
    _i:r._i,
    _corte:r._corte,
    [C.owner]:r.o,
    [C.aging]:r.a,
    [C.metodo]:r.m,
    [C.fres]:r.f,
    [C.stock]:r.s
  }));
}
function sk(r){return r[C.stock]||r._i;}
function getEM(r){return overrides[sk(r)]||'';}

function handleFile(e,corte){
  const file=e.target.files[0];if(!file)return;
  setSync('loading','Procesando...');
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const parsed=parseCSV(ev.target.result).filter(matchAgente);
      if(corte==='morning'){
        const cancelados=new Set(Object.entries(overrides).filter(([k,v])=>v.toUpperCase()==='CANCELADA').map(([k])=>k));
        allData=parsed.filter(r=>!cancelados.has(sk(r))).map(r=>({...r,_corte:'morning'}));
      }else{
        if(!allData.length){setSync('err','Carga primero el corte mañana');return;}
        const existing=new Set(allData.map(r=>sk(r)));
        const nuevos=parsed.filter(r=>!existing.has(sk(r))).map(r=>({...r,_corte:'afternoon'}));
        allData=[...allData,...nuevos];
      }
      populateFilters();render();
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('dealCount').textContent=allData.length+' deals';
      push(); // guarda CSV en nube para todos
    }catch(err){setSync('err','Error al leer CSV');}
    e.target.value='';
  };
  reader.readAsText(file,'UTF-8');
}

function populateFilters(){
  const fA=document.getElementById('fA'),fE=document.getElementById('fE'),fM=document.getElementById('fM');
  const owners=[...new Set(allData.map(r=>r[C.owner]).filter(Boolean))].sort();
  const metodos=[...new Set(allData.map(r=>r[C.metodo]).filter(Boolean))].sort();
  fA.innerHTML='<option value="">Todos los asesores</option>'+owners.map(v=>`<option value="${v}">${v}</option>`).join('');
  fE.innerHTML='<option value="">Todos los estatus</option>'+ESTATUS.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
  fM.innerHTML='<option value="">Todos los métodos de pago</option>'+metodos.map(v=>`<option value="${v}">${v}</option>`).join('');
}

function getFiltered(){
  const fA=document.getElementById('fA').value;
  const fE=document.getElementById('fE').value;
  const fM=document.getElementById('fM').value;
  const fC=document.getElementById('fC').value;
  const q=document.getElementById('fQ').value.toLowerCase();
  return allData.filter(r=>(!fA||r[C.owner]===fA)&&(!fE||getEM(r).toUpperCase()===fE)&&(!fM||r[C.metodo]===fM)&&(!fC||r._corte===fC)&&(!q||[r[C.owner],sk(r),r[C.fres]].join(' ').toLowerCase().includes(q)));
}

function drawBars(id,data,fn,off){
  const cnt={};data.forEach(r=>{const k=fn(r)||'—';cnt[k]=(cnt[k]||0)+1;});
  const sorted=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const max=sorted[0]?.[1]||1;
  document.getElementById(id).innerHTML=sorted.map(([k,v],i)=>`
    <div class="bar-row"><div class="blabel" title="${k}">${k}</div>
    <div class="bbg"><div class="bfill" style="width:${Math.round(v/max*100)}%;background:${EC[k]||COLORS[(i+off)%COLORS.length]}"></div></div>
    <div class="bcount">${v}</div></div>`).join('');
}

function render(){
  const d=getFiltered();
  document.getElementById('dealCount').textContent=d.length+' deals';
  const nuevos=allData.filter(r=>r._corte==='afternoon').length;
  const pagaHoy=d.filter(r=>getEM(r).toUpperCase()==='PAGA HOY').length;
  const pagados=d.filter(r=>getEM(r).toUpperCase()==='PAGADO').length;
  const sinEstatus=d.filter(r=>!getEM(r)).length;
  const conNota=d.filter(r=>notes[sk(r)]?.current).length;
  document.getElementById('metrics').innerHTML=[
    ['Total',d.length,false],['Nuevas hoy',nuevos,true],['Pagan hoy',pagaHoy,false],
    ['Pagados',pagados,false],['Sin estatus',sinEstatus,false],['Con notas',conNota,false]
  ].map(([l,v,h])=>`<div class="metric"><div class="mlabel">${l}</div><div class="mval${h?' hi':''}">${v}</div></div>`).join('');
  drawBars('bEM',d,r=>getEM(r)||'Sin estatus',0);
  drawBars('bOwner',d,r=>r[C.owner],3);
  document.getElementById('tbody').innerHTML=d.map(r=>{
    const ag=parseInt(r[C.aging])||0;
    const agC=ag<=3?'ag0':ag<=7?'ag1':'ag2';
    const em=getEM(r).toUpperCase();
    const col=EC[em]||null;
    const nota=notes[sk(r)];
    const hasN=!!nota?.current;
    return`<tr class="${r._corte==='afternoon'?'is-new':''}">
      <td>${r[C.owner]||'—'}</td>
      <td>${em&&col?`<span class="badge" style="background:${col}22;color:${col};border:1px solid ${col}66" onclick="openStatus('${r._i}')">${getEM(r)}</span>`:`<span style="color:#ccc;cursor:pointer;font-size:11px" onclick="openStatus('${r._i}')">+ Asignar</span>`}</td>
      <td class="${agC}">${ag}d</td>
      <td>${r[C.metodo]||'—'}</td>
      <td>${r[C.fres]||'—'}</td>
      <td>${r._corte==='afternoon'?'<span class="new-badge">NUEVA</span>':'Mañana'}</td>
      <td>${hasN?`<div class="note-preview">${nota.current}</div><div class="note-date">${nota.date}</div>`:''}<button class="note-btn${hasN?' has-note':''}" onclick="openNote('${r._i}')">${hasN?'Editar':'+ Nota'}</button></td>
    </tr>`;
  }).join('');
}

// ── Modal estatus ─────────────────────────────────────────
function openStatus(idx){
  editIdx=idx;
  document.getElementById('sOpts').innerHTML=ESTATUS.map(s=>`<div class="sopt" onclick="setStatus('${s.name}')"><div class="sdot" style="background:${s.c}"></div><div>${s.name}</div></div>`).join('');
  document.getElementById('ovStatus').classList.add('open');
}
function closeStatus(){document.getElementById('ovStatus').classList.remove('open');editIdx=null;}
function setStatus(name){
  const r=allData.find(x=>x._i===editIdx);
  if(r){overrides[sk(r)]=name;pushMeta();}
  closeStatus();render();
}

// ── Modal nota ────────────────────────────────────────────
function openNote(idx){
  editIdx=idx;
  const r=allData.find(x=>x._i===idx);if(!r)return;
  const n=notes[sk(r)]||{};
  document.getElementById('nTitle').textContent=`Nota — ${r[C.owner]||'Deal'} · Stock ${sk(r)}`;
  document.getElementById('nMeta').textContent=n.date?`Última edición: ${n.date}`:'Sin notas aún';
  document.getElementById('nText').value=n.current||'';
  const hist=n.history||[];
  document.getElementById('nHist').innerHTML=hist.length?`<div class="hist-title">Historial</div>`+hist.slice().reverse().map(h=>`<div class="hist-entry">${h.text}<div class="hist-date">${h.date}</div></div>`).join(''):'';
  document.getElementById('ovNote').classList.add('open');
  setTimeout(()=>document.getElementById('nText').focus(),100);
}
function closeNote(){document.getElementById('ovNote').classList.remove('open');editIdx=null;}
function saveNote(){
  const r=allData.find(x=>x._i===editIdx);if(!r)return;
  const text=document.getElementById('nText').value.trim();
  if(!text){deleteNote();return;}
  const now=new Date().toLocaleString('es-MX',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
  const prev=notes[sk(r)]||{};
  const hist=prev.history||[];
  if(prev.current)hist.push({text:prev.current,date:prev.date});
  notes[sk(r)]={current:text,date:now,history:hist};
  pushMeta();closeNote();render();
}
function deleteNote(){
  const r=allData.find(x=>x._i===editIdx);if(!r)return;
  delete notes[sk(r)];
  pushMeta();closeNote();render();
}

// ── Init ──────────────────────────────────────────────────
initBin();
</script>
